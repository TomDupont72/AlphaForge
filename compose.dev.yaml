services:
  backend:
    build: ./backend
    container_name: alphaforge-backend
    ports:
      - "127.0.0.1:8001:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: alphaforge-frontend
    ports:
      - "127.0.0.1:4200:80"
    depends_on:
      - backend
    restart: unless-stopped
