services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    depends_on:
      - redis
    build: ./backend
    container_name: alphaforge-backend
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: alphaforge-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
