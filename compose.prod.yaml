services:
  backend:
    image: ghcr.io/tomdupont72/alphaforge-backend:latest
    env_file:
      - /etc/alphaforge-api.env
    ports:
      - "127.0.0.1:8001:8000"
    networks:
      - shared-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/tomdupont72/alphaforge-frontend:latest
    ports:
      - "127.0.0.1:4200:80"
    restart: unless-stopped

networks:
  shared-network:
    external: true
