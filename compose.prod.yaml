services:
  backend:
    image: ghcr.io/tomdupont72/alphaforge-backend:1.0.0
    env_file:
      - /etc/alphaforge-api.env
    ports:
      - "8001:8000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/tomdupont72/alphaforge-frontend:1.0.0
    ports:
      - "4200:80"
    restart: unless-stopped