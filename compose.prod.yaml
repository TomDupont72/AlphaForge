services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    depends_on:
      - redis
    image: ghcr.io/tomdupont72/alphaforge-backend:latest
    env_file:
      - /etc/alphaforge-api.env
    ports:
      - "8001:8000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/tomdupont72/alphaforge-frontend:latest
    ports:
      - "4200:80"
    restart: unless-stopped
