<main class="min-h-screen flex flex-col justify-center items-center gap-4">
    @if (auth.loading()) {
        <z-loader/>
    }
    @else if (auth.mode() === 'signIn') {
        <sign-in (submitted)="auth.signIn($event)"/>
    } @else {
        <register (submitted)="auth.register($event)"/>
    }
</main>
